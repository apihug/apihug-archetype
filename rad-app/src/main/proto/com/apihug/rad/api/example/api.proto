syntax = "proto3";

package com.apihug.rad.api.example;

import "google/protobuf/empty.proto";
import "apihug/protobuf/swagger/annotations.proto";

message TemplateExampleRequest {

  option (hope.swagger.schema) = {
    json_schema: {
      description: "This is a template example request,REMOVE IT";
    };
  };

  string name = 1 [(hope.swagger.field) = {
    description: "user input name";
    example: "Jake"
    empty: false;
  }];

  string email = 3 [(hope.swagger.field) = {
    description: "user input email";
    example: "jake@bigger.com"
    email: true;
    mock: {
      nature: EMAIL
    }
  }];

}

message TemplateExampleResponse {

  option (hope.swagger.schema) = {
    json_schema: {
      description: "This is a template example response";
    };
  };

  string name = 1 [(hope.swagger.field) = {
    description: "user input name";
    example: "Jake"
    empty: true;
  }];

  string hello = 3 [(hope.swagger.field) = {
    description: "response hello";
    example: "hello Jake"
    empty: false;
  }];

}

service TemplateExampleService {

    option (hope.swagger.svc) = {
        path: "/example";
        description: "This is a example service remember to remove it";
    };

    rpc ExamplePost (TemplateExampleRequest) returns (TemplateExampleResponse) {
        option (hope.swagger.operation) = {
            post: "/post-test";
            description: "post test example";
            priority: HIGH;

        };
    }

    rpc Ping(google.protobuf.Empty) returns(google.protobuf.Empty){
        option (hope.swagger.operation) = {
            post: "/ping";
            description: "ping you like /ping?name=jake";
            priority: HIGH;
            parameters: {
                parameter: {
                    name: "name";
                    in: QUERY;
                    schema: {
                        format: STRING;
                    };
                }
            }
        };
    }

}