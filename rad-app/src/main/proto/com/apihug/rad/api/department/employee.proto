syntax = "proto3";

package com.apihug.rad.api.department;

import "apihug/protobuf/swagger/annotations.proto";
import "google/protobuf/empty.proto";

// ============ 部门员工管理 API ============

service DepartmentEmployeeService {
  option (hope.swagger.svc) = {
    path: "/department-employees",
    description: "部门员工管理服务，提供员工部门关联功能"
  };

  rpc AddEmployeeToDepartment (AddEmployeeRequest) returns (google.protobuf.Empty) {
    option (hope.swagger.operation) = {
      post: "/department-employees";
      description: "添加员工到部门";
      summary: "添加员工";
      tags: "department-employee";
      authorization: {
        rbac: {
          authorities: ["DEPARTMENT_ASSIGN_EMPLOYEE"];
        }
      };
    };
  }

  rpc RemoveEmployeeFromDepartment (RemoveEmployeeRequest) returns (google.protobuf.Empty) {
    option (hope.swagger.operation) = {
      delete: "/department-employees/{employeeId}";
      description: "从部门移除员工";
      summary: "移除员工";
      tags: "department-employee";
      authorization: {
        rbac: {
          authorities: ["DEPARTMENT_ASSIGN_EMPLOYEE"];
        }
      };
      parameters: {
        parameter: {
          name: "employeeId";
          in: PATH;
          schema: {
            format: INTEGER;
            empty: false;
          };
        };
      };
    };
  }

  rpc TransferEmployee (TransferEmployeeRequest) returns (google.protobuf.Empty) {
    option (hope.swagger.operation) = {
      post: "/department-employees/transfer";
      description: "员工调岗";
      summary: "员工调岗";
      tags: "department-employee";
      authorization: {
        rbac: {
          authorities: ["DEPARTMENT_ASSIGN_EMPLOYEE"];
        }
      };
    };
  }

  rpc GetDepartmentEmployees (google.protobuf.Empty) returns (DepartmentEmployeeList) {
    option (hope.swagger.operation) = {
      get: "/departments/{departmentId}/employees";
      description: "获取部门员工列表";
      summary: "获取部门员工";
      tags: "department-employee";
      authorization: {
        low_limit_risky_mode: LOGIN
      };
      parameters: {
        parameter: {
          name: "departmentId";
          in: PATH;
          schema: {
            format: INTEGER;
            empty: false;
          };
        };
      };
    };
  }
}

message AddEmployeeRequest {
  option (hope.swagger.schema) = {
    json_schema: {
      title: "AddEmployeeRequest";
      description: "添加员工请求";
    };
  };

  int64 employee_id = 1 [(hope.swagger.field) = {
    description: "员工 ID";
    example: "1";
    empty: false;
    minimum: 1;
  }];

  int64 department_id = 2 [(hope.swagger.field) = {
    description: "部门 ID";
    example: "1";
    empty: false;
    minimum: 1;
  }];

  string position = 3 [(hope.swagger.field) = {
    description: "职位";
    example: "高级工程师";
    max_length: 100;
  }];
}

message RemoveEmployeeRequest {
  option (hope.swagger.schema) = {
    json_schema: {
      title: "RemoveEmployeeRequest";
      description: "移除员工请求";
    };
  };

  int64 employee_id = 1 [(hope.swagger.field) = {
    description: "员工 ID";
    example: "1";
    empty: false;
    minimum: 1;
  }];
}

message TransferEmployeeRequest {
  option (hope.swagger.schema) = {
    json_schema: {
      title: "TransferEmployeeRequest";
      description: "员工调岗请求";
    };
  };

  int64 employee_id = 1 [(hope.swagger.field) = {
    description: "员工 ID";
    example: "1";
    empty: false;
    minimum: 1;
  }];

  int64 from_department_id = 2 [(hope.swagger.field) = {
    description: "原部门 ID";
    example: "1";
    empty: false;
    minimum: 1;
  }];

  int64 to_department_id = 3 [(hope.swagger.field) = {
    description: "目标部门 ID";
    example: "2";
    empty: false;
    minimum: 1;
  }];

  string position = 4 [(hope.swagger.field) = {
    description: "新职位";
    example: "技术经理";
    max_length: 100;
  }];
}

message DepartmentEmployeeList {
  option (hope.swagger.schema) = {
    json_schema: {
      title: "DepartmentEmployeeList";
      description: "部门员工列表";
    };
  };

  int64 department_id = 1 [(hope.swagger.field) = {
    description: "部门 ID";
    example: "1";
    empty: false;
  }];

  repeated EmployeeInfo employees = 2 [(hope.swagger.field) = {
    description: "员工列表";
  }];
}

message EmployeeInfo {
  option (hope.swagger.schema) = {
    json_schema: {
      title: "EmployeeInfo";
      description: "员工信息";
    };
  };

  int64 id = 1 [(hope.swagger.field) = {
    description: "员工 ID";
    example: "1";
    empty: false;
  }];

  string username = 2 [(hope.swagger.field) = {
    description: "用户名";
    example: "zhangsan";
    empty: false;
    mock: {nature: NAME};
  }];

  string real_name = 3 [(hope.swagger.field) = {
    description: "真实姓名";
    example: "张三";
    empty: false;
    mock: {nature: NAME};
  }];

  string email = 4 [(hope.swagger.field) = {
    description: "邮箱";
    example: "zhangsan@example.com";
    mock: {nature: EMAIL};
  }];

  string position = 5 [(hope.swagger.field) = {
    description: "职位";
    example: "高级工程师";
    mock: {nature: NAME};
  }];

  string joined_at = 6 [(hope.swagger.field) = {
    description: "加入部门时间";
    example: "2024-01-15T10:30:00";
    date_format: ISO_LOCAL_DATE_TIME;
  }];
}
