syntax = "proto3";

package com.apihug.rad.api.permission;

import "apihug/protobuf/swagger/annotations.proto";
import "google/protobuf/empty.proto";

// ============ 权限管理 API ============

service PermissionService {
  option (hope.swagger.svc) = {
    path: "/permissions",
    description: "权限管理服务，提供权限查询和聚合功能"
  };

  // 获取用户的角色权限集合
  rpc GetRolePermissions (google.protobuf.Empty) returns (PermissionInfo) {
    option (hope.swagger.operation) = {
      get: "/roles";
      description: "获取用户的角色权限集合";
      summary: "获取角色权限";
      tags: "permission";
      authorization: {
        low_limit_risky_mode: LOGIN
      };
      output_repeated: true;
    };
  }

  // 获取用户的菜单权限集合
  rpc GetMenuPermissions (google.protobuf.Empty) returns (PermissionInfo) {
    option (hope.swagger.operation) = {
      get: "/menus";
      description: "获取用户的菜单权限集合";
      summary: "获取菜单权限";
      tags: "permission";
      authorization: {
        low_limit_risky_mode: LOGIN
      };
      output_repeated: true;
    };
  }

  // 获取用户的所有权限（角色权限 ∪ 菜单权限）
  rpc GetAllPermissions (google.protobuf.Empty) returns (PermissionInfo) {
    option (hope.swagger.operation) = {
      get: "/all";
      description: "获取用户的所有权限（聚合）";
      summary: "获取所有权限";
      tags: "permission";
      authorization: {
        low_limit_risky_mode: LOGIN
      };
      output_repeated: true;
    };
  }
}

// 权限信息
message PermissionInfo {
  option (hope.swagger.schema) = {
    json_schema: {
      title: "PermissionInfo";
      description: "权限信息";
    };
  };

  string permission_code = 1 [(hope.swagger.field) = {
    description: "权限代码";
    example: "user:create";
  }];

  string permission_name = 2 [(hope.swagger.field) = {
    description: "权限名称";
    example: "创建用户";
  }];
}
