syntax = "proto3";

package com.apihug.rad.api.organization;

import "apihug/protobuf/swagger/annotations.proto";
import "google/protobuf/empty.proto";

// ============ 组织管理 API ============

service OrganizationService {
  option (hope.swagger.svc) = {
    path: "/organizations",
    description: "组织管理服务，提供组织树、部门树查询等功能"
  };

  rpc GetOrganizationTree (google.protobuf.Empty) returns (OrganizationTreeNode) {
    option (hope.swagger.operation) = {
      get: "/tree";
      description: "获取组织树形结构";
      summary: "获取组织树";
      tags: "organization";
      authorization: {
        low_limit_risky_mode: LOGIN
      };
    };
  }

  rpc GetDepartmentTree (google.protobuf.Empty) returns (DepartmentTreeNode) {
    option (hope.swagger.operation) = {
      get: "/department-tree";
      description: "获取当前组织的部门树形结构";
      summary: "获取部门树";
      tags: "organization";
      authorization: {
        low_limit_risky_mode: LOGIN
      };
    };
  }

  rpc GetUserDepartments (google.protobuf.Empty) returns (UserDepartmentList) {
    option (hope.swagger.operation) = {
      get: "/user-departments";
      description: "获取用户的部门列表";
      summary: "获取用户部门";
      tags: "organization";
      authorization: {
        low_limit_risky_mode: LOGIN
      };
    };
  }

  // 获取当前用户的组织列表
  rpc GetUserOrganizations (google.protobuf.Empty) returns (OrganizationSummary) {
    option (hope.swagger.operation) = {
      get: "/my-organizations";
      description: "获取当前用户所属的组织列表";
      summary: "获取我的组织";
      tags: "organization";
      authorization: {
        low_limit_risky_mode: LOGIN
      };
      pageable: true;
    };
  }

  // 设置默认组织
  rpc SetDefaultOrganization (SetDefaultOrganizationRequest) returns (google.protobuf.Empty) {
    option (hope.swagger.operation) = {
      post: "/my-organizations/{organizationId}/default";
      description: "设置用户的默认组织";
      summary: "设置默认组织";
      tags: "organization";
      authorization: {
        low_limit_risky_mode: LOGIN
      };
      parameters: {
        parameter: {
          name: "organizationId";
          in: PATH;
          schema: {
            format: INTEGER;
            empty: false;
          };
        };
      };
    };
  }
}

message OrganizationTreeNode {
  option (hope.swagger.schema) = {
    json_schema: {
      title: "OrganizationTreeNode";
      description: "组织树节点";
    };
  };

  OrganizationSummary organization = 1 [(hope.swagger.field) = {
    description: "组织信息";
  }];

  repeated OrganizationTreeNode children = 2 [(hope.swagger.field) = {
    description: "子组织列表";
  }];
}

message OrganizationSummary {
  option (hope.swagger.schema) = {
    json_schema: {
      title: "OrganizationSummary";
      description: "组织摘要";
    };
  };

  int64 id = 1 [(hope.swagger.field) = {
    description: "组织 ID";
    example: "1";
    empty: false;
  }];

  string organization_code = 2 [(hope.swagger.field) = {
    description: "组织代码";
    example: "acme_corp";
    empty: false;
    mock: {nature: NAME};
  }];

  string organization_name = 3 [(hope.swagger.field) = {
    description: "组织名称";
    example: "Acme 公司";
    empty: false;
    mock: {nature: NAME};
  }];

  int64 parent_id = 4 [(hope.swagger.field) = {
    description: "父组织 ID";
    example: "0";
  }];

  string status = 5 [(hope.swagger.field) = {
    description: "组织状态";
    example: "ACTIVE";
  }];
}

message DepartmentTreeNode {
  option (hope.swagger.schema) = {
    json_schema: {
      title: "DepartmentTreeNode";
      description: "部门树节点";
    };
  };

  DepartmentSummary department = 1 [(hope.swagger.field) = {
    description: "部门信息";
  }];

  repeated DepartmentTreeNode children = 2 [(hope.swagger.field) = {
    description: "子部门列表";
  }];
}

message DepartmentSummary {
  option (hope.swagger.schema) = {
    json_schema: {
      title: "DepartmentSummary";
      description: "部门摘要";
    };
  };

  int64 id = 1 [(hope.swagger.field) = {
    description: "部门 ID";
    example: "1";
    empty: false;
  }];

  string dept_code = 2 [(hope.swagger.field) = {
    description: "部门代码";
    example: "tech_dev";
    empty: false;
    mock: {nature: NAME};
  }];

  string dept_name = 3 [(hope.swagger.field) = {
    description: "部门名称";
    example: "研发部";
    empty: false;
    mock: {nature: NAME};
  }];

  int64 parent_id = 4 [(hope.swagger.field) = {
    description: "父部门 ID";
    example: "0";
  }];

  int32 sort_order = 5 [(hope.swagger.field) = {
    description: "排序顺序";
    example: "10";
  }];

  string status = 6 [(hope.swagger.field) = {
    description: "部门状态";
    example: "ACTIVE";
  }];
}

message UserDepartmentList {
  option (hope.swagger.schema) = {
    json_schema: {
      title: "UserDepartmentList";
      description: "用户部门列表";
    };
  };

  repeated DepartmentInfo departments = 1 [(hope.swagger.field) = {
    description: "用户所属部门列表";
  }];

  int64 primary_department_id = 2 [(hope.swagger.field) = {
    description: "主部门 ID";
    example: "1";
  }];
}

message DepartmentInfo {
  option (hope.swagger.schema) = {
    json_schema: {
      title: "DepartmentInfo";
      description: "部门信息";
    };
  };

  int64 id = 1 [(hope.swagger.field) = {
    description: "部门 ID";
    example: "1";
    empty: false;
  }];

  string dept_code = 2 [(hope.swagger.field) = {
    description: "部门代码";
    example: "tech_dev";
    empty: false;
    mock: {nature: NAME};
  }];

  string dept_name = 3 [(hope.swagger.field) = {
    description: "部门名称";
    example: "研发部";
    empty: false;
    mock: {nature: NAME};
  }];

  bool is_primary = 4 [(hope.swagger.field) = {
    description: "是否主部门";
    example: "true";
  }];
}

// 设置默认组织请求
message SetDefaultOrganizationRequest {
  option (hope.swagger.schema) = {
    json_schema: {
      title: "SetDefaultOrganizationRequest";
      description: "设置默认组织请求";
    };
  };
  // 组织 ID 通过 path 参数传递
}
