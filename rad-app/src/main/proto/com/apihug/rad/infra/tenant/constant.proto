syntax = "proto3";

package com.apihug.rad.infra.tenant;

import "apihug/protobuf/extend/constant.proto";
import "apihug/protobuf/swagger/annotations.proto";

enum TenantStatusEnum {
  option (hope.swagger.enm) = {
    description: "租户状态枚举"
  };

  ACTIVE = 0 [(hope.constant.field) = {
    code: 1,
    message: "active",
    message2: "活跃"
  }];

  DISABLED = 1 [(hope.constant.field) = {
    code: 2,
    message: "disabled",
    message2: "禁用"
  }];

  EXPIRED = 2 [(hope.constant.field) = {
    code: 3,
    message: "expired",
    message2: "过期"
  }];
}

enum TenantErrorEnum {
  option (hope.swagger.enm) = {
    description: "租户相关错误"
  };

  TENANT_NOT_FOUND = 0 [(hope.constant.field) = {
    code: 10004001,
    message: "Tenant not found",
    message2: "租户不存在",
    error: {
      tips: "Check if the tenant ID is correct",
      phase: DOMAIN,
      severity: FATAL
    }
  }];

  TENANT_CODE_EXISTS = 1 [(hope.constant.field) = {
    code: 10004002,
    message: "Tenant code already exists",
    message2: "租户代码已存在",
    error: {
      tips: "Use a different tenant code",
      phase: DOMAIN,
      severity: WARN
    }
  }];

  TENANT_HAS_USERS = 2 [(hope.constant.field) = {
    code: 10004003,
    message: "Tenant has users",
    message2: "租户下有用户，无法删除",
    error: {
      tips: "Remove all users from this tenant first",
      phase: DOMAIN,
      severity: WARN
    }
  }];
}
