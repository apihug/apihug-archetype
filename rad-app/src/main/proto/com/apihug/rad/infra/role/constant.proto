syntax = "proto3";

package com.apihug.rad.infra.role;

import "apihug/protobuf/extend/constant.proto";
import "apihug/protobuf/swagger/annotations.proto";

enum RoleStatusEnum {
  option (hope.swagger.enm) = {
    description: "角色状态枚举定义"
  };

  ACTIVE = 0 [(hope.constant.field) = {
    code: 1,
    message: "active",
    message2: "活跃"
  }];

  INACTIVE = 1 [(hope.constant.field) = {
    code: 2,
    message: "inactive",
    message2: "非活跃"
  }];

  DISABLED = 2 [(hope.constant.field) = {
    code: 3,
    message: "disabled",
    message2: "禁用"
  }];
}
