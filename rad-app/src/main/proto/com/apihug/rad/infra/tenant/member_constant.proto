syntax = "proto3";

package com.apihug.rad.infra.tenant;

import "apihug/protobuf/extend/constant.proto";
import "apihug/protobuf/swagger/annotations.proto";

// 成员类型枚举（原 EmployeeTypeEnum，从 organization 迁移至 tenant）
enum MemberTypeEnum {
  option (hope.swagger.enm) = {
    description: "租户成员类型枚举"
  };

  FULL_TIME = 0 [(hope.constant.field) = {
    code: 1,
    message: "full_time",
    message2: "正式员工"
  }];

  PART_TIME = 1 [(hope.constant.field) = {
    code: 2,
    message: "part_time",
    message2: "兼职员工"
  }];

  CONTRACTOR = 2 [(hope.constant.field) = {
    code: 3,
    message: "contractor",
    message2: "外包员工"
  }];

  INTERN = 3 [(hope.constant.field) = {
    code: 4,
    message: "intern",
    message2: "实习生"
  }];
}

// 成员角色枚举（成员在租户中的管理角色）
enum MemberRoleEnum {
  option (hope.swagger.enm) = {
    description: "租户成员角色枚举"
  };

  MEMBER = 0 [(hope.constant.field) = {
    code: 1,
    message: "member",
    message2: "普通成员"
  }];

  ADMIN = 1 [(hope.constant.field) = {
    code: 2,
    message: "admin",
    message2: "管理员"
  }];

  OWNER = 2 [(hope.constant.field) = {
    code: 3,
    message: "owner",
    message2: "拥有者"
  }];
}

// 成员状态枚举（成员在租户内的状态）
// 注意：值名使用 TM_ 前缀避免与同 package 的 TenantStatusEnum 冲突
enum TenantMemberStatusEnum {
  option (hope.swagger.enm) = {
    description: "租户成员状态枚举"
  };

  TM_ACTIVE = 0 [(hope.constant.field) = {
    code: 1,
    message: "active",
    message2: "正常"
  }];

  TM_INACTIVE = 1 [(hope.constant.field) = {
    code: 2,
    message: "inactive",
    message2: "已退出"
  }];

  TM_LOCKED = 2 [(hope.constant.field) = {
    code: 3,
    message: "locked",
    message2: "已锁定"
  }];
}

// 租户成员相关错误
enum TenantMemberErrorEnum {
  option (hope.swagger.enm) = {
    description: "租户成员相关错误"
  };

  MEMBER_NOT_FOUND = 0 [(hope.constant.field) = {
    code: 10007001,
    message: "Tenant member not found",
    message2: "租户成员不存在",
    error: {
      tips: "Check if the member ID is correct",
      phase: DOMAIN,
      severity: FATAL
    }
  }];

  MEMBER_ALREADY_EXISTS = 1 [(hope.constant.field) = {
    code: 10007002,
    message: "Member already exists in this tenant",
    message2: "该成员已在此租户中",
    error: {
      tips: "The customer is already a member of this tenant",
      phase: DOMAIN,
      severity: WARN
    }
  }];

  MEMBER_LOCKED = 2 [(hope.constant.field) = {
    code: 10007003,
    message: "Member is locked",
    message2: "成员已被锁定",
    error: {
      tips: "Contact your tenant administrator",
      phase: DOMAIN,
      severity: WARN
    }
  }];

  MEMBER_TENANT_ACCESS_DENIED = 3 [(hope.constant.field) = {
    code: 10007004,
    message: "Access denied: member does not belong to the specified tenant",
    message2: "越权访问：该成员不属于当前租户",
    error: {
      tips: "The member belongs to a different tenant and cannot be accessed here",
      http_status: FORBIDDEN,
      phase: DOMAIN,
      severity: WARN
    }
  }];
}
