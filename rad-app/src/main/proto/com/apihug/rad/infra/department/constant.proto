syntax = "proto3";

package com.apihug.rad.infra.department;

import "apihug/protobuf/extend/constant.proto";
import "apihug/protobuf/swagger/annotations.proto";

enum DeptStatusEnum {
  option (hope.swagger.enm) = {
    description: "部门状态枚举"
  };

  ACTIVE = 0 [(hope.constant.field) = {
    code: 1,
    message: "active",
    message2: "启用"
  }];

  DISABLED = 1 [(hope.constant.field) = {
    code: 2,
    message: "disabled",
    message2: "禁用"
  }];
}

enum DepartmentErrorEnum {
  option (hope.swagger.enm) = {
    description: "部门相关错误"
  };

  DEPARTMENT_NOT_FOUND = 0 [(hope.constant.field) = {
    code: 10005001,
    message: "Department not found",
    message2: "部门不存在",
    error: {
      tips: "Check if the department ID is correct",
      phase: DOMAIN,
      severity: FATAL
    }
  }];

  DEPT_CODE_EXISTS = 1 [(hope.constant.field) = {
    code: 10005002,
    message: "Department code already exists",
    message2: "部门代码已存在",
    error: {
      tips: "Use a different department code",
      phase: DOMAIN,
      severity: WARN
    }
  }];

  DEPARTMENT_HAS_CHILDREN = 2 [(hope.constant.field) = {
    code: 10005003,
    message: "Department has child departments",
    message2: "部门有子部门，无法删除",
    error: {
      tips: "Remove all child departments first",
      phase: DOMAIN,
      severity: WARN
    }
  }];

  DEPARTMENT_HAS_EMPLOYEES = 3 [(hope.constant.field) = {
    code: 10005004,
    message: "Department has employees",
    message2: "部门有员工，无法删除",
    error: {
      tips: "Remove all employees from this department first",
      phase: DOMAIN,
      severity: WARN
    }
  }];
}
