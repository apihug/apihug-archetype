syntax = "proto3";

package com.apihug.rad.infra.customer;

import "apihug/protobuf/extend/constant.proto";
import "apihug/protobuf/swagger/annotations.proto";

enum CustomerStatusEnum {
  option (hope.swagger.enm) = {
    description: "客户状态枚举"
  };

  ACTIVE = 0 [(hope.constant.field) = {
    code: 1,
    message: "active",
    message2: "活跃"
  }];

  INACTIVE = 1 [(hope.constant.field) = {
    code: 2,
    message: "inactive",
    message2: "非活跃"
  }];

  LOCKED = 2 [(hope.constant.field) = {
    code: 3,
    message: "locked",
    message2: "锁定"
  }];

  DISABLED = 3 [(hope.constant.field) = {
    code: 4,
    message: "disabled",
    message2: "禁用"
  }];
}


enum CustomerPlatformTypeEnum {
  option (hope.swagger.enm) = {
    description: "客户平台标志"
  };


  MEMBER = 0 [(hope.constant.field) = {
    code: 1,
    message: "platform member",
    message2: "平台员工"
  }];

  MANAGER = 1 [(hope.constant.field) = {
    code: 2,
    message: "platform manager",
    message2: "平台管理员"
  }];

  OWNER = 2 [(hope.constant.field) = {
    code:3,
    message: "platform owner",
    message2: "平台拥有者"
  }];
}
