syntax = "proto3";

package com.apihug.rad.infra.organization;

import "apihug/protobuf/extend/constant.proto";
import "apihug/protobuf/swagger/annotations.proto";

enum OrganizationStatusEnum {
  option (hope.swagger.enm) = {
    description: "组织状态枚举"
  };

  ORG_ACTIVE = 0 [(hope.constant.field) = {
    code: 1,
    message: "active",
    message2: "活跃"
  }];

  ORG_INACTIVE = 1 [(hope.constant.field) = {
    code: 2,
    message: "inactive",
    message2: "未激活"
  }];

  ORG_DISABLED = 2 [(hope.constant.field) = {
    code: 3,
    message: "disabled",
    message2: "禁用"
  }];
}

enum EmployeeTypeEnum {
  option (hope.swagger.enm) = {
    description: "员工类型枚举"
  };

  FULL_TIME = 0 [(hope.constant.field) = {
    code: 1,
    message: "full_time",
    message2: "正式员工"
  }];

  PART_TIME = 1 [(hope.constant.field) = {
    code: 2,
    message: "part_time",
    message2: "兼职员工"
  }];

  CONTRACTOR = 2 [(hope.constant.field) = {
    code: 3,
    message: "contractor",
    message2: "外包员工"
  }];

  INTERN = 3 [(hope.constant.field) = {
    code: 4,
    message: "intern",
    message2: "实习生"
  }];
}

enum CustomerOrgStatusEnum {
  option (hope.swagger.enm) = {
    description: "客户在组织内的状态枚举"
  };

  ACTIVE = 0 [(hope.constant.field) = {
    code: 1,
    message: "active",
    message2: "正常"
  }];

  INACTIVE = 1 [(hope.constant.field) = {
    code: 2,
    message: "inactive",
    message2: "已退出"
  }];

  LOCKED = 2 [(hope.constant.field) = {
    code: 3,
    message: "locked",
    message2: "已锁定"
  }];
}
