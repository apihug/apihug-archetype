syntax = "proto3";

package com.apihug.rad.domain.organization;

import "apihug/protobuf/domain/annotations.proto";
import "com/apihug/rad/infra/organization/constant.proto";

message OrganizationEntity {
  option (hope.persistence.table) = {
    name: "SYS_ORGANIZATION",
    description: "组织表",
    wires: [ALL],
    indexes: {
      name: "IDX_SYS_ORG_PARENT_ID",
      column_list: ["parent_id"]
    },
    indexes: {
      name: "IDX_SYS_ORG_CODE",
      column_list: ["organization_code"]
    },
    unique_constraints: {
      name: "UK_SYS_ORG_CODE",
      column_list: ["organization_code"]
    }
  };

  int64 parent_id = 1 [(hope.persistence.column) = {
    name: "PARENT_ID",
    description: "父组织 ID",
    nullable: false,
    default_value: "0"
  }];

  string organization_code = 2 [(hope.persistence.column) = {
    name: "ORGANIZATION_CODE",
    description: "组织代码",
    nullable: false,
    length: 50,
    type: VARCHAR,
    unique: true
  }];

  string organization_name = 3 [(hope.persistence.column) = {
    name: "ORGANIZATION_NAME",
    description: "组织名称",
    nullable: false,
    length: 100,
    type: VARCHAR
  }];

  int32 sort_order = 4 [(hope.persistence.column) = {
    name: "SORT_ORDER",
    description: "排序顺序",
    nullable: false,
    default_value: "0"
  }];

  com.apihug.rad.infra.organization.OrganizationStatusEnum status = 5 [(hope.persistence.column) = {
    name: "STATUS_CODE",
    description: "组织状态",
    nullable: false,
    enum_type: STRING,
    length: 20,
    default_value: "ACTIVE"
  }];
}

message CustomerOrganizationEntity {
  option (hope.persistence.table) = {
    name: "SYS_CUSTOMER_ORGANIZATION",
    description: "客户组织关联表（员工身份）",
    wires: [IDENTIFIABLE, AUDITABLE],
    indexes: {
      name: "IDX_SYS_CUST_ORG_CUSTOMER_ID",
      column_list: ["customer_id"]
    },
    indexes: {
      name: "IDX_SYS_CUST_ORG_ORG_ID",
      column_list: ["organization_id"]
    },
    unique_constraints: {
      name: "UK_SYS_CUST_ORG",
      column_list: ["customer_id", "organization_id"]
    }
  };

  int64 customer_id = 1 [(hope.persistence.column) = {
    name: "CUSTOMER_ID",
    description: "客户 ID",
    nullable: false
  }];

  int64 organization_id = 2 [(hope.persistence.column) = {
    name: "ORGANIZATION_ID",
    description: "组织 ID",
    nullable: false
  }];

  bool is_default = 3 [(hope.persistence.column) = {
    name: "IS_DEFAULT",
    description: "是否默认组织",
    nullable: false,
    default_value: "false"
  }];

  com.apihug.rad.infra.organization.EmployeeTypeEnum employee_type = 4 [(hope.persistence.column) = {
    name: "EMPLOYEE_TYPE",
    description: "员工类型",
    nullable: false,
    enum_type: STRING,
    length: 20,
    default_value: "FULL_TIME"
  }];

  com.apihug.rad.infra.organization.CustomerOrgStatusEnum status = 5 [(hope.persistence.column) = {
    name: "STATUS_CODE",
    description: "在组织内的状态",
    nullable: false,
    enum_type: STRING,
    length: 20,
    default_value: "ACTIVE"
  }];

  int64 department_id = 6 [(hope.persistence.column) = {
    name: "DEPARTMENT_ID",
    description: "所属部门 ID",
    nullable: true
  }];

  string position = 7 [(hope.persistence.column) = {
    name: "POSITION",
    description: "职位",
    nullable: true,
    length: 100,
    type: VARCHAR
  }];
}
