syntax = "proto3";

package com.apihug.rad.domain.role;

import "apihug/protobuf/domain/annotations.proto";
import "apihug/protobuf/extend/constant.proto";
import "com/apihug/rad/infra/role/constant.proto";

message RoleEntity {
  option (hope.persistence.table) = {
    name: "SYS_ROLE",
    description: "角色表",
    wires: [ALL],
    indexes: {
      name: "IDX_SYS_ROLE_CODE",
      column_list: ["role_code"]
    },
    unique_constraints: {
      name: "UK_SYS_ROLE_CODE",
      column_list: ["role_code"]
    }
  };

  string role_code = 1 [(hope.persistence.column) = {
    name: "ROLE_CODE",
    description: "角色代码",
    nullable: false,
    length: 50,
    type: VARCHAR,
    unique: true
  }];

  string role_name = 2 [(hope.persistence.column) = {
    name: "ROLE_NAME",
    description: "角色名称",
    nullable: false,
    length: 100,
    type: VARCHAR
  }];

  string description = 3 [(hope.persistence.column) = {
    name: "DESCRIPTION",
    description: "角色描述",
    nullable: true,
    length: 500,
    type: VARCHAR
  }];

  com.apihug.rad.infra.role.RoleStatusEnum status = 4 [(hope.persistence.column) = {
    name: "STATUS_CODE",
    description: "角色状态",
    nullable: false,
    enum_type: STRING,
    length: 20,
    default_value: "ACTIVE"
  }];
}
