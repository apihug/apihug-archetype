syntax = "proto3";

package com.apihug.rad.domain.department;

import "apihug/protobuf/domain/annotations.proto";
import "com/apihug/rad/infra/department/constant.proto";

message DepartmentEntity {
  option (hope.persistence.table) = {
    name: "SYS_DEPARTMENT",
    description: "部门表",
    wires: [ALL],
    indexes: {
      name: "IDX_SYS_DEPARTMENT_PARENT_ID",
      column_list: ["parent_id"]
    },
    indexes: {
      name: "IDX_SYS_DEPARTMENT_CODE",
      column_list: ["dept_code"]
    },
    indexes: {
      name: "IDX_SYS_DEPARTMENT_TENANT",
      column_list: ["tenant_id"]
    },
    unique_constraints: {
      name: "UK_SYS_DEPARTMENT_CODE",
      column_list: ["tenant_id", "dept_code"]
    }
  };

  int64 parent_id = 1 [(hope.persistence.column) = {
    name: "PARENT_ID",
    description: "父部门 ID",
    nullable: false,
    default_value: "0"
  }];

  // tenant_id 由 wires: [ALL] 中的 TENANTABLE 自动提供，无需手动定义

  string dept_code = 3 [(hope.persistence.column) = {
    name: "DEPT_CODE",
    description: "部门代码",
    nullable: false,
    length: 50,
    type: VARCHAR,
    unique: true
  }];

  string dept_name = 4 [(hope.persistence.column) = {
    name: "DEPT_NAME",
    description: "部门名称",
    nullable: false,
    length: 100,
    type: VARCHAR
  }];

  int32 sort_order = 5 [(hope.persistence.column) = {
    name: "SORT_ORDER",
    description: "排序顺序",
    nullable: false,
    default_value: "0"
  }];

  string manager_id = 6 [(hope.persistence.column) = {
    name: "MANAGER_ID",
    description: "部门负责人 ID",
    nullable: true,
    length: 50,
    type: VARCHAR
  }];

  com.apihug.rad.infra.department.DeptStatusEnum status = 7 [(hope.persistence.column) = {
    name: "STATUS_CODE",
    description: "部门状态",
    nullable: false,
    enum_type: STRING,
    length: 20,
    default_value: "ACTIVE"
  }];
}
